on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year (e.g. 2016)'
        required: true
        default: '2016'
      month:
        description: 'Month (e.g. 04)'
        required: true
        default: '04'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Install lftp
      run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

    - name: Download Himawari L2 Cloud Data
      run: |
        YEAR=${{ github.event.inputs.year }}
        MONTH=${{ github.event.inputs.month }}

        echo "=== Downloading ${YEAR}/${MONTH} ==="

        lftp -u "${{ secrets.JAXA_USER }},${{ secrets.JAXA_PASS }}" ftp.ptree.jaxa.jp <<EOF
        set ftp:ssl-allow no
        set mirror:parallel-transfer-count 2
        set xfer:log true
        set xfer:log-file /tmp/lftp.log
        mirror --verbose --parallel=2 \
          /pub/himawari/L2/CLP/010/${YEAR}${MONTH}/ \
          ./data/${YEAR}${MONTH}/
        quit
        EOF

        echo "=== Done ==="
        echo "Files: $(find ./data/ -name '*.nc' | wc -l)"
        echo "Size:  $(du -sh ./data/ | cut -f1)"

    - name: Create ZIP
      run: |
        YEAR=${{ github.event.inputs.year }}
        MONTH=${{ github.event.inputs.month }}
        cd data && zip -r ../himawari_${YEAR}${MONTH}.zip . && cd ..
        ls -lh himawari_*.zip

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: himawari_${{ github.event.inputs.year }}${{ github.event.inputs.month }}
        path: himawari_*.zip
        retention-days: 7
