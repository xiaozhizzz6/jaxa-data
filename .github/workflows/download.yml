name: Download JAXA CLP Data (30min)

on:
  workflow_dispatch:
    inputs:
      year:
        default: '2016'
      month:
        default: '04'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Download CLP 30min
      run: |
        python3 -u << 'PYEOF'
        import os, sys, ftplib, time

        Y = "${{ github.event.inputs.year }}"
        M = "${{ github.event.inputs.month }}"
        H = "ftp.ptree.jaxa.jp"
        U = "${{ secrets.JAXA_USER }}"
        P = "${{ secrets.JAXA_PASS }}"
        BASE = f"/pub/himawari/L2/CLP/010/{Y}{M}"

        def connect():
            for _ in range(3):
                try:
                    f = ftplib.FTP()
                    f.connect(H, 21, timeout=30)
                    f.login(U, P)
                    f.voidcmd('TYPE I')
                    return f
                except:
                    time.sleep(5)
            raise Exception("Cannot connect")

        ftp = connect()
        print(f"Connected. {Y}/{M}")

        # 获取所有文件路径
        todo = []
        days = sorted(ftp.nlst(BASE))
        for day_path in days:
            day = os.path.basename(day_path)
            for hour in sorted(ftp.nlst(f"{BASE}/{day}")):
                hh = os.path.basename(hour)
                for fpath in ftp.nlst(f"{BASE}/{day}/{hh}"):
                    fname = os.path.basename(fpath)
                    parts = fname.split('_')
                    if len(parts) >= 4 and parts[3][-2:] in ('00','30'):
                        todo.append((fpath, f"data/{Y}{M}/{day}/{hh}/{fname}"))

        print(f"Files to download: {len(todo)}")

        ok = fail = 0
        for i, (remote, local) in enumerate(todo):
            os.makedirs(os.path.dirname(local), exist_ok=True)

            for attempt in range(3):
                try:
                    with open(local, 'wb') as f:
                        ftp.retrbinary(f'RETR {remote}', f.write)
                    ok += 1
                    break
                except:
                    if attempt < 2:
                        try: ftp.quit()
                        except: pass
                        ftp = connect()
                    else:
                        fail += 1

            if (i+1) % 48 == 0 or i == len(todo)-1:
                print(f"  [{i+1}/{len(todo)}] ok={ok} fail={fail}", flush=True)

        ftp.quit()
        total = sum(os.path.getsize(os.path.join(r,f)) for r,_,fs in os.walk('data') for f in fs)
        print(f"DONE! ok={ok} fail={fail}  size={total/1e9:.1f}GB")
        PYEOF

    - name: Zip & Upload
      run: |
        cd data && zip -r ../CLP_${{ github.event.inputs.year }}${{ github.event.inputs.month }}.zip . && cd ..
        ls -lh *.zip

    - uses: actions/upload-artifact@v4
      with:
        name: CLP_${{ github.event.inputs.year }}${{ github.event.inputs.month }}
        path: CLP_*.zip
        retention-days: 7

