name: Download JAXA CLP Data (30min)

on:
  workflow_dispatch:
    inputs:
      year:
        default: '2016'
      month:
        default: '04'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Download CLP 30min
      run: |
        python3 -u << 'PYEOF'
        import os, sys, ftplib

        Y = "${{ github.event.inputs.year }}"
        M = "${{ github.event.inputs.month }}"
        HOST = "ftp.ptree.jaxa.jp"
        USER = "${{ secrets.JAXA_USER }}"
        PASS = "${{ secrets.JAXA_PASS }}"
        BASE = f"/pub/himawari/L2/CLP/010/{Y}{M}"

        ftp = ftplib.FTP()
        ftp.connect(HOST, 21, timeout=30)
        ftp.login(USER, PASS)
        ftp.voidcmd('TYPE I')
        print(f"Connected. Listing {Y}/{M}...")

        days = sorted(ftp.nlst(BASE))
        print(f"Days: {len(days)}")

        n = ok = 0
        for day_path in days:
            day = os.path.basename(day_path)
            for hour in sorted(ftp.nlst(f"{BASE}/{day}")):
                hh = os.path.basename(hour)
                for fpath in ftp.nlst(f"{BASE}/{day}/{hh}"):
                    fname = os.path.basename(fpath)
                    parts = fname.split('_')
                    if len(parts) < 4: continue
                    minute = parts[3][-2:]
                    if minute not in ('00','30'): continue

                    local = f"data/{Y}{M}/{day}/{hh}/{fname}"
                    os.makedirs(os.path.dirname(local), exist_ok=True)

                    try:
                        with open(local, 'wb') as f:
                            ftp.retrbinary(f'RETR {fpath}', f.write)
                        ok += 1
                    except: pass
                    n += 1
            print(f"  {day}: {ok}/{n}", flush=True)

        ftp.quit()
        total = sum(os.path.getsize(os.path.join(r,f)) for r,_,fs in os.walk('data') for f in fs)
        print(f"DONE! {ok} files, {total/1e9:.1f} GB")
        PYEOF

    - name: Zip & Upload
      run: |
        cd data && zip -r ../CLP_${{ github.event.inputs.year }}${{ github.event.inputs.month }}.zip . && cd ..
        ls -lh *.zip

    - uses: actions/upload-artifact@v4
      with:
        name: CLP_${{ github.event.inputs.year }}${{ github.event.inputs.month }}
        path: CLP_*.zip
        retention-days: 7
