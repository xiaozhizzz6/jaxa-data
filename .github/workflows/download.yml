name: Download JAXA Himawari Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year'
        default: '2016'
      month:
        description: 'Month (e.g. 04)'
        default: '04'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Download
      run: |
        YEAR="${{ github.event.inputs.year }}"
        MONTH="${{ github.event.inputs.month }}"
        USER="${{ secrets.JAXA_USER }}"
        PASS="${{ secrets.JAXA_PASS }}"
        HOST="ftp.ptree.jaxa.jp"
        BASE="/pub/himawari/L2/CLP/010/${YEAR}${MONTH}"

        # 先列目录确认存在
        echo "=== 列出 ${YEAR}${MONTH} 的日期 ==="
        curl -s --user "${USER}:${PASS}" "ftp://${HOST}${BASE}/" 2>&1
        echo ""
        echo "=================================="

        n=0; fail=0
        for day in {01..31}; do
          for hour in {00..23}; do
            for min in 00 30; do
              fname="NC_H08_${YEAR}${MONTH}${day}_${hour}${min}_L2CLP010_FLDK.02401_02401.nc"
              remote="ftp://${HOST}${BASE}/${day}/${hour}/${fname}"
              local_path="data/${YEAR}${MONTH}/${day}/${hour}"
              mkdir -p "$local_path"

              # 用 curl 下载, 超时15秒, 失败不重试
              http_code=$(curl -s -o "${local_path}/${fname}" \
                -w "%{http_code}" --max-time 15 \
                --user "${USER}:${PASS}" "$remote" 2>/dev/null)

              if [ "$http_code" = "226" ] || [ "$http_code" = "200" ]; then
                n=$((n+1))
              else
                fail=$((fail+1))
                rm -f "${local_path}/${fname}"
              fi

              if [ $(( (n+fail) % 48 )) -eq 0 ]; then
                echo "[${YEAR}-${MONTH}-${day} ${hour}:${min}] done: $n / fail: $fail"
              fi
            done
          done
        done

        echo "=================================="
        echo "DONE! Downloaded: $n  Failed: $fail"

    - name: Zip
      run: |
        cd data && zip -r ../himawari.zip . && cd ..
        ls -lh himawari.zip

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: himawari_${{ github.event.inputs.year }}${{ github.event.inputs.month }}
        path: himawari.zip
        retention-days: 7
